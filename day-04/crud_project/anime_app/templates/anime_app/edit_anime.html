{% extends "anime_app/base.html" %}

{% block content %}
  <div class="card" style="max-width:640px;">
    <h1 style="font-size:28px; margin-bottom:6px;">Edit: {{ anime.name }}</h1>
    <p class="sub">Update the fields and save.</p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Save Changes</button>
    </form>

    <p style="margin-top:12px;">
      <a href="{% url 'home' %}">← Back to list</a>
    </p>
  </div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>We ♥ Anime</title>
  <style>
    :root{
      --bg: #fff8f2;
      --card: #ffffff;
      --text: #1f2937;
      --muted: rgba(31,41,55,.7);
      --border: rgba(0,0,0,.12);
      --accent: #2563eb;
      --accentSoft: #eef2ff;
      --danger: #dc2626;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg), #f5fbff);
    }
    .wrap{ max-width: 980px; margin: 0 auto; padding: 28px 16px; }
    .grid{ display:grid; grid-template-columns: 1.3fr 1fr; gap: 18px; align-items:start; }
    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 22px rgba(0,0,0,.06);
    }
    h1{ margin:0 0 12px; font-size: 40px; letter-spacing: -0.5px; }
    .sub{ margin: 0 0 14px; color: var(--muted); }
    ul{ margin:0; padding-left: 18px; }
    li{ margin: 10px 0; }
    .pill{
      display:inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      background: var(--accentSoft);
      color: var(--accent);
      font-size: 12px;
      margin-left: 8px;
    }
    a{ color: var(--accent); text-decoration: none; }
    a:hover{ text-decoration: underline; }
    .delete{ color: var(--danger); }
    form p{ margin: 10px 0; }
    input, select, textarea{
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
    }
    button{
      width: 100%;
      border: 0;
      padding: 10px 12px;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover{ filter: brightness(0.95); }
    @media (max-width: 820px){
      .grid{ grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
